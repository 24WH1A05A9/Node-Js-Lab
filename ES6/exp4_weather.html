<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }

        #chartContainer {
            width: 500px;
            height: 300px;
            margin: auto;
        }

        #weatherChart {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

    <h3>24WH1A05A9 - Lakshmi Vaishnavi</h3>
    <h2>Weather App</h2>

    <input type="text" id="city" placeholder="Enter city">
    <button onclick="getWeather()">Get Weather</button>

    <br><br>

    <div id="chartContainer">
        <canvas id="weatherChart"></canvas>
    </div>

    <script>
        const apiKey = "e600716daea57d3fd87af0640d0b3443";

        let chart;

        // Arrow Function + Async/Await
        const getWeather = async () => {

            const city = document.getElementById("city").value;

            if (!city) {
                alert("Please enter a city name");
                return;
            }

            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric`
                );

                const data = await response.json();

                console.log(data);

                // Handle API errors
                if (data.cod !== "200") {
                    alert("Error: " + data.message);
                    return;
                }

                processWeather(data, displayGraph);

            } catch (error) {
                console.error("Error:", error);
                alert("Something went wrong!");
            }
        };

        const processWeather = (data, callback) => {
            const temps = data.list.slice(0, 8).map(item => item.main.temp);
            const labels = data.list.slice(0, 8).map(item => item.dt_txt);

            callback(labels, temps);
        };

        const fakePromise = () => {
            return new Promise(resolve => {
                resolve("Promise executed");
            });
        };

        fakePromise().then(console.log);

        const displayGraph = (labels, temps) => {

            const ctx = document.getElementById("weatherChart").getContext("2d");

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: "line",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Temperature (°C)",
                        data: temps,
                        borderWidth: 2,
                        backgroundColor: "rgba(75,192,192,0.2)",
                        borderColor: "blue",
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        };
    </script>

</body>
</html>
